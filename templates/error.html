{% extends "base.html" %}

{% block title %}Error - AI Medical Image Classifier{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header" style="background: #e74c3c;">
                <h2 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Error {{ error_code }}</h2>
            </div>
            <div class="card-body text-center">
                <div style="font-size: 72px; color: #e74c3c; margin: 30px 0;">
                    <i class="fas fa-frown"></i>
                </div>
                <h3>{{ message }}</h3>
                <p class="text-muted mt-3">Something went wrong with your request. Please try again.</p>
                
                <div class="mt-5">
                    <a href="/" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> Return to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
