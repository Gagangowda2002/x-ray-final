version: '3.9'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./static/heatmaps:/app/static/heatmaps
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - SECRET_KEY=your-secret-key-here
    command: flask run --host=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s